name: Tests

on:
  pull_request:
    branches:
      - "develop"
  push:
    branches:
      - "develop"

# global environment variables for all jobs
env:
  APP_ENV: testing
  APP_DEBUG: "true"
  APP_KEY: SomeRandomString3232RandomString
  APP_TIMEZONE: UTC
  APP_URL: http://localhost/
  APP_ENVIRONMENT_ONLY: "true"
  CACHE_DRIVER: array
  SESSION_DRIVER: array
  MAIL_MAILER: array
  QUEUE_CONNECTION: sync
  HASHIDS_SALT: test123

jobs:
  pint:
    name: Run Pint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php:
          - 8.5
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, cli, curl, gd, mbstring, mysql, openssl, pdo, tokenizer, xml, zip, intl
          tools: composer:v2
          coverage: none

      - name: Get cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install composer dependencies
        run: composer install --no-interaction --no-suggest --no-progress --no-scripts

      - name: Test Lint Issues
        run: vendor/bin/pint --test -v

  sqlite:
    name: Test SQLite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: database/testing.sqlite
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, cli, curl, gd, mbstring, mysql, openssl, pdo, pdo_sqlite, tokenizer, xml, zip, intl
          tools: composer:v2
          coverage: none

      - name: Get cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install composer dependencies
        run: composer install --no-interaction --no-suggest --no-progress --no-scripts

      - name: TOUCH SQLite file
        run: touch database/testing.sqlite

      - name: RUN Unit tests
        run: vendor/bin/pest tests/Unit
        env:
          DB_HOST: UNIT_NO_DB

      - name: RUN Integration tests
        run: vendor/bin/pest tests/Integration

  mysql:
    name: Test MySQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        database:
          - mysql:8
          - mysql:9
    services:
      database:
        image: ${{ matrix.database }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_DATABASE: testing
      DB_USERNAME: root
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, cli, curl, gd, mbstring, mysql, openssl, pdo, tokenizer, xml, zip, intl
          tools: composer:v2
          coverage: none

      - name: Get cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install composer dependencies
        run: composer install --no-interaction --no-suggest --no-progress --no-scripts

      - name: RUN Unit tests
        run: vendor/bin/pest tests/Unit --parallel
        env:
          DB_HOST: UNIT_NO_DB

      - name: RUN Integration tests
        run: vendor/bin/pest tests/Integration --parallel
        env:
          DB_PORT: ${{ job.services.database.ports[3306] }}
          DB_USERNAME: root

  mariadb:
    name: Test MariaDB
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        database:
          - mariadb:10
          - mariadb:11
    services:
      database:
        image: ${{ matrix.database }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping || mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_DATABASE: testing
      DB_USERNAME: root
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, cli, curl, gd, mbstring, mysql, openssl, pdo, tokenizer, xml, zip, intl
          tools: composer:v2
          coverage: none

      - name: Get cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install composer dependencies
        run: composer install --no-interaction --no-suggest --no-progress --no-scripts

      - name: RUN Unit tests
        run: vendor/bin/pest tests/Unit --parallel
        env:
          DB_HOST: UNIT_NO_DB

      - name: RUN Integration tests
        run: vendor/bin/pest tests/Integration --parallel
        env:
          DB_PORT: ${{ job.services.database.ports[3306] }}
          DB_USERNAME: root

  pgsql:
    name: Test PostgreSQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php:
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        database:
          - "postgres:17"
          - "postgres:18"
    services:
      database:
        image: ${{ matrix.database }}
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_DATABASE: testing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, cli, curl, gd, mbstring, mysql, openssl, pdo, pdo_pgsql, tokenizer, xml, zip, intl
          tools: composer:v2
          coverage: none

      - name: Get cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install composer dependencies
        run: composer install --no-interaction --no-suggest --no-progress --no-scripts

      - name: RUN Unit tests
        run: vendor/bin/pest tests/Unit --parallel
        env:
          DB_HOST: UNIT_NO_DB

      - name: RUN Integration tests
        run: vendor/bin/pest tests/Integration --parallel