name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # write is required to create releases and push.
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build:production

      - name: Create release branch and bump version + build
        env:
          REF: ${{ github.ref }}
        run: |
          REF_TAG=${GITHUB_REF#refs/tags/}      
          VERSION=${REF_TAG#v}               

          IFS='.-' read -r MAJOR MINOR PATCH TYPE <<< "$VERSION"

          MAJOR=$(printf "%02d" "$MAJOR")
          MINOR=$(printf "%02d" "$MINOR")
          PATCH=$(printf "%02d" "$PATCH")

          # Map prerelease type to number
          case "$TYPE" in
            alpha) TYPE_NUM=01 ;;
            beta)  TYPE_NUM=02 ;;
            rc)    TYPE_NUM=03 ;;
            *)     TYPE_NUM=00 ;;  # stable
          esac

          # Build number
          BUILD="${MAJOR}${MINOR}${PATCH}${TYPE_NUM}"

          sed -i "s/'version' => '.*'/'version' => '${VERSION}'/" config/app.php
          sed -i "s/'build' => '.*'/'build' => '${BUILD}'/" config/app.php

          BRANCH="release/${REF_TAG}"
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git config --local user.name 'Reviactyl CI'
          git checkout -b "$BRANCH"
          git add config/app.php
          git commit -m "ci(release): bump version to ${VERSION} and build to ${BUILD}"
          git push -u origin "$BRANCH"

      - name: Create release archive
        run: |
          rm -rf node_modules tests CODE_OF_CONDUCT.md CONTRIBUTING.md flake.lock flake.nix phpunit.xml shell.nix
          tar -czf panel.tar.gz * .editorconfig .env.example .eslintignore .eslintrc.js .gitignore .prettierrc.json

      - name: Fetch all tags
        run: git fetch --tags

      - name: Find previous stable tag
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -vE '(alpha|beta|rc)' | sed -n '2p')
          echo "Found Previous Tag: $PREV_TAG"
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
      - name: Create upgrade.zip (changed files only)
        if: steps.prev_tag.outputs.tag != ''
        run: |
          mkdir upgrade
          git diff --name-only ${{ steps.prev_tag.outputs.tag }} HEAD | while read file; do
            if [ -f "$file" ]; then
              mkdir -p "upgrade/$(dirname "$file")"
              cp "$file" "upgrade/$file"
            fi
          done
          cd upgrade
          zip -r ../upgrade.zip .
          
      - name: Extract changelog
        run: |
          sed -n "/^## ${REF_TAG}/,/^## /{/^## /b;p}" CHANGELOG.md > ./RELEASE_CHANGELOG

      - name: Create checksum and add to changelog
        run: |
          SUM=$(sha256sum panel.tar.gz)
          echo -e "\n#### SHA256 Checksum\n\n\`\`\`\n$SUM\n\`\`\`\n" >> ./RELEASE_CHANGELOG
          echo -e "panel.tar.gz:\n\`\`\`\n$SUM\n\`\`\`" >> ./RELEASE_CHANGELOG
          echo "panel.tar.gz: $PANEL_SUM" > checksum.txt
          if [ -f upgrade.zip ]; then
             UPGRADE_SUM=$(sha256sum upgrade.zip)
             echo -e "upgrade.zip:\n\`\`\`\n$UPGRADE_SUM\n\`\`\`" >> ./RELEASE_CHANGELOG
             echo "upgrade.zip: $UPGRADE_SUM" >> checksum.txt
          fi

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          body_path: ./RELEASE_CHANGELOG
          files: |
            panel.tar.gz
            upgrade.zip
            checksum.txt
